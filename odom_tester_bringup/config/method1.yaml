# 방법 ① (odom_compare) 파라미터 — 네임스페이스 /method1
/method1/odom_compare:
  ros__parameters:
    # 인터페이스 (로봇 실측값)
    cmd_vel_topic: /swerve_controller/cmd_vel
    odom_a_topic:  /swerve_controller/odom     # 비교 대상 A (swerve 원본)
    odom_b_topic:  /fused_odom                 # 비교 대상 B (EKF)
    feedback_source: b                          # 거리/각도 판정에 쓸 odom (a|b) — 측정엔 무영향
    odom_frame: odom
    base_frame:  base_footprint

    # 루틴
    side_length: 1.0        # [m]  1x1
    loops: 5                # 한 실행의 바퀴 수  (방법①=5)
    repeats: 1              # 독립 실행 횟수     (방법①=1)

    # 속도·타이밍 (swerve_controller 상한: lin 0.8 / ang 1.2, timeout 0.5s)
    v_lin: 0.15             # [m/s]
    v_ang: 0.3              # [rad/s]
    publish_rate: 30.0      # [Hz]  timeout(0.5s) 대비 충분, 컨트롤러 update_rate와 일치
    settle_time: 1.0        # [s]
    # 도달 허용오차 — 정밀 폐합을 위해 타이트하게. 최소속도(아래)와 함께 조여야 함.
    reach_tol_lin: 0.001    # [m]   1mm
    reach_tol_ang: 0.002    # [rad] ~0.11°
    # 목표 근처 최소속도 = 정지 분해능(주기당 이동량). 허용오차보다 작아야 헌팅 안 함.
    v_lin_min: 0.01         # [m/s]  30Hz → 주기당 ~0.33mm
    v_ang_min: 0.02         # [rad/s] 30Hz → 주기당 ~0.038°
    slowdown_lin: 0.10      # [m]   감속 시작 남은거리
    slowdown_ang: 0.10      # [rad] 감속 시작 남은각도

    # 안전 가드
    max_seg_time: 30.0      # [s]
    max_seg_dist: 1.5       # [m]

    # 출력 — 상대경로면 실행(CWD) 기준. 프로젝트 로컬(results/, .gitignore 대상) 권장.
    output_dir: results
